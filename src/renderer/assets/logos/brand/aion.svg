<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 80 80" fill="none">
  <title>1ONE Command</title>
  <circle cx="40" cy="40" r="40" fill="black"/>
  <!-- "1" - vertical stroke on the left -->
  <line x1="28" y1="22" x2="28" y2="58" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="22" y1="29" x2="28" y2="22" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- "ONE" - circle representing O -->
  <circle cx="50" cy="40" r="13" stroke="white" stroke-width="4.5" fill="none"/>
  <!-- Inner dot accent -->
  <circle cx="50" cy="40" r="3" fill="white"/>
</svg>
